### Application
server.port=8081
spring.application.name=SmartAssist

### Database Configuration
spring.datasource.url=jdbc:mariadb://localhost:3307/SmartAssistDB?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=password
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver
spring.jpa.database-platform=org.hibernate.dialect.MariaDB103Dialect

### Hibernate / JPA
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

### Session Management (JDBC)
spring.session.store-type=jdbc
spring.session.jdbc.initialize-schema=always
server.servlet.session.timeout=600
server.servlet.session.cookie.name=MY_SESSION_COOKIE
server.servlet.session.cookie.http-only=true

# Ollama API base URL (Docker container)
spring.ai.ollama.base-url=http://localhost:11434
spring.ai.ollama.chat.model=llama3

### Security: OAuth2 Resource Server with Keycloak
keycloak.base.url=http://localhost:8080
keycloak.realm=gsu-realm
app.base.url=http://localhost:8081

spring.security.oauth2.resourceserver.jwt.issuer-uri=${keycloak.base.url}/realms/${keycloak.realm}
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=${spring.security.oauth2.resourceserver.jwt.issuer-uri}/protocol/openid-connect/certs

# Optional: custom JWT converter
jwt.auth.converter.principle-attribute=preferred_username
jwt.auth.converter.resource-id=smartassist-backend-client
