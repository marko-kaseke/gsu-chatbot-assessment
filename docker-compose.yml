services:
  mysql-db:
    image: mysql:8.0
    container_name: mysql-container
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: password
      #MYSQL_USER: root2         #optional
      #MYSQL_PASSWORD: password  #optional
      MYSQL_DATABASE: smartassistdb
    ports:
      - "3306:3306"
    volumes:
      - mysql_db_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -uroot -ppassword"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 120s
    networks:
        - smartassist-net
      
  postgres-db:
    image: postgres:15
    container_name: postgres-container
    restart: unless-stopped
    environment:
      POSTGRES_PASSWORD: password
      POSTGRES_DB: keycloakdb
      POSTGRES_USER: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 120s
    networks:
        - smartassist-net

  keycloak:
    image: quay.io/keycloak/keycloak:26.5.4
    container_name: keycloak-container
    restart: unless-stopped
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: kaseke
      KC_BOOTSTRAP_ADMIN_PASSWORD: 1
      #KC_DB: dev-file #for development
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres-db:5432/keycloakdb
      KC_DB_USERNAME: postgres
      KC_DB_PASSWORD: password
      KC_PROXY_HEADERS: xforwarded
      KC_HEALTH_ENABLED: "true"
      KC_METRICS_ENABLED: "true"
      KC_HOSTNAME: localhost
      KC_HOSTNAME_PORT: 8080
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_ENABLED: "true"
    command:
        - start
        #- --optimized
        - --import-realm
        
    ports:
      - "8080:8080"   # Host 8080 maps to container 8080
    volumes:
      - keycloak_data:/opt/keycloak/data
      - ./realm-export.json:/opt/keycloak/data/import/realm-export.json
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/8080"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 120s
    networks:
        - smartassist-net
    depends_on:
      postgres-db:
        condition: service_healthy

  backend:
    image: markokaseke/smartassist-backend:1.0.0
    container_name: backend-container
    restart: unless-stopped
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql-db:3306/smartassistdb?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: password
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: com.mysql.cj.jdbc.Driver
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      FILE_UPLOAD_DIR: /smartassist-files
      SPRING_AI_OLLAMA_BASE_URL: http://ollama:11434
      #SPRING_AI_OLLAMA_CHAT_MODEL: tinyllama
      SPRING_AI_OLLAMA_CHAT_MODEL: llama3      
      
      # OAuth2 Client configuration
      SERVER_ADDRESS: 0.0.0.0
      APP_BASE_URL: http://localhost
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI: http://localhost:8080/realms/gsu-realm
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI: http://keycloak:8080/realms/gsu-realm/protocol/openid-connect/certs
      SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_KEYCLOAK_CLIENT_SECRET: Ti1AS3czT4CzrzKpX6AkJTzsXAw3TPZw
    ports:
      - "8081:8081"
    depends_on:
      mysql-db:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    volumes:
      - ./smartassist-files:/smartassist-files
      - ./storage:/storage
    networks:
        - smartassist-net
      
  ollama:
    image: ollama/ollama:0.20.6
    container_name: ollama-container
    ports:
        - "11434:11434"
    volumes:
        - ollama_data:/root/.ollama
    networks:
        - smartassist-net
    # optional but IMPORTANT for stability
    healthcheck:
        test: ["CMD", "true"]
        interval: 10s
        timeout: 5s
        retries: 10    
    
  frontend:
    image: markokaseke/smartassist-frontend:1.0.0
    container_name: frontend-container
    ports:
        - "80:80"
    depends_on:
        - backend
    restart: unless-stopped  
    networks:
        - smartassist-net

volumes:
  mysql_db_data:
  postgres_db_data:
  keycloak_data:
  ollama_data:
  #You do not need to declare ./smartassist-files or ./storage because they're bind mounts (host directories).
  #Make sure smartassist-files/ and storage/ exist on your host machine (in the same directory as docker-compose.yml), or Docker will create them as empty folders.

networks:
  smartassist-net:
    driver: bridge


#docker compose pull ==> docker compose up -d ==> docker exec -it ollama-container ollama pull llama3