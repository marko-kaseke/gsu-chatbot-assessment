<div class="create-faq-container">
  <h2>Create New FAQ</h2>

  <!-- FAQ Form -->
  <form (ngSubmit)="onSubmit()">
    <div class="form-group">
      <label for="category">Category</label>
      <input
        type="text"
        id="category"
        [(ngModel)]="newFaq.category"
        name="category"
        class="form-control"
        required
      />
    </div>

    <div class="form-group">
      <label for="question">Question</label>
      <input
        type="text"
        id="question"
        [(ngModel)]="newFaq.question"
        name="question"
        class="form-control"
        required
      />
    </div>

    <div class="form-group">
      <label for="answer">Answer</label>
      <textarea
        id="answer"
        [(ngModel)]="newFaq.answer"
        name="answer"
        class="form-control"
        required
      ></textarea>
    </div>

    <div class="form-group">
      <label for="keywords">Keywords (comma separated)</label>
      <input
        type="text"
        id="keywords"
        [(ngModel)]="newFaq.keywords"
        name="keywords"
        class="form-control"
        (ngModelChange)="onKeywordsChange($event)"
        required
      />
    </div>

    <button type="submit" class="submit-btn" [disabled]="!newFaq.category || !newFaq.question || !newFaq.answer || !newFaq.keywords.length">
      Create FAQ
    </button>
  </form>

  <!-- Show response after submitting the FAQ -->
  <div *ngIf="response$ | async as response" class="response-card">
    <h3>FAQ Created Successfully!</h3>
    <p><strong>Category:</strong> {{ response.category }}</p>
    <p><strong>Question:</strong> {{ response.question }}</p>
    <p><strong>Answer:</strong> {{ response.answer }}</p>
    <p><strong>Keywords:</strong> {{ response.keywords.join(', ') }}</p>
  </div>
</div>
